<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TodoList 실습</title>

    <!-- CSS 파일 연결 -->
    <link rel="stylesheet" href="style.css" />

    <!-- JavaScript 파일 연결 -->
    <!-- defer는 HTML을 먼저 읽은 뒤 JavaScript를 실행하게 한다. -->
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="container">
      <section id="todoApp">
        <div class="title">
          <h1>To-do List</h1>
          <p class="description">오늘 해야 할 일을 입력하고 관리해 봅니다.</p>
        </div>
        <div class="todo-cnt">
          <span>총 <span id="todoCnt">0</span>개 중 <span id="doneCnt">0</span>개 완료</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-label">
            <span>오늘의 달성률</span>
            <strong id="progressPercent">0%</strong>
          </div>
          <progress id="todoProgress" max="100" value="0" aria-label="오늘의 할 일 달성률">0%</progress>
        </div>
        <form id="todoForm" class="todo-form">
          <label for="todoInput" class="sr-only">할 일</label>
          <input type="text" id="todoInput" placeholder="할 일을 입력하세요" autocomplete="off" />
          <button id="todoAddBtn" type="submit">추가</button>
        </form>
        <hr />

        <ul id="todoList" class="todo-list"></ul>
        <p id="emptyTodoListMsg">등록된 할 일이 없습니다.</p>
      </section>

      <section class="pomodoro" aria-labelledby="pomodoroTitle">
        <div class="pomodoro-heading">
          <div>
            <p class="pomodoro-eyebrow">집중 타이머</p>
            <h2 id="pomodoroTitle">뽀모도로</h2>
          </div>
          <span id="pomodoroMode" class="pomodoro-mode">집중</span>
        </div>

        <label for="focusTodo" class="sr-only">집중할 할 일</label>
        <select id="focusTodo">
          <option value="">집중할 할 일을 선택하세요</option>
        </select>

        <p id="pomodoroTime" class="pomodoro-time" role="timer" aria-live="off">25:00</p>
        <p id="pomodoroStatus" class="pomodoro-status" aria-live="polite">집중할 준비가 됐어요.</p>

        <div class="tomato-harvest">
          <div class="tomato-harvest-heading">
            <span>오늘 수확한 토마토</span>
            <strong><span id="tomatoCount">0</span>개</strong>
          </div>
          <ul id="tomatoShelf" class="tomato-shelf" aria-label="완료한 집중 세션"></ul>
          <p id="emptyTomatoMsg">집중 세션을 완주하면 토마토가 열려요.</p>
        </div>

        <div class="pomodoro-controls">
          <button id="pomodoroStart" type="button">시작</button>
          <button id="pomodoroReset" type="button" class="secondary-btn">초기화</button>
        </div>
      </section>
    </main>
  </body>
</html>
